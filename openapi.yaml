openapi: 3.1.0
info:
  title: SISR
  description: ''
  license:
    name: ''
  version: 0.0.1
paths:
  /api/v1/config:
    get:
      tags:
      - config
      summary: Get Config File
      description: |-
        Returns the contents of the config file at the default config path.
        Fields not present in the file are omitted.
      operationId: get_config_file
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigFileData'
        '404':
          description: No config file found at default path
    patch:
      tags:
      - config
      summary: Update Config File
      description: |-
        Merges the provided fields into the config file at the default config path.
        Only fields present in the request body are written; all fields are optional.
      operationId: update_config_file
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigFileData'
        required: true
      responses:
        '200':
          description: OK
  /api/v1/connect_viiper:
    post:
      tags:
      - viiper
      summary: Connect Viiper
      description: Connects to Viiper service
      operationId: connect_viiper
      responses:
        '200':
          description: ''
        '401':
          description: VIIPER auth required
        '409':
          description: Issue with VIIPER connection
        '500':
          description: Unknown error
        '502':
          description: Bad gateway - VIIPER not reachable
  /api/v1/create_marker_shortcut:
    post:
      tags:
      - inject
      summary: Create Marker Shortcut
      description: Creates a marker shortcut in Steam
      operationId: create_marker_shortcut
      responses:
        '200':
          description: ''
        '409':
          description: Marker Shortcut present / Steam CEF Debugging not reachable
        '500':
          description: Unknown error
  /api/v1/enable_cef_remote_debug:
    post:
      tags:
      - steam
      summary: Enable CEF Remote Debugging
      description: Enables the CEF remote debugging interface of Steam by creating the required file (and restarting Steam)
      operationId: enable_cef_remote_debug
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                restart_sisr:
                  type: boolean
        required: true
      responses:
        '200':
          description: ''
        '500':
          description: Unknown error
  /api/v1/force_controller_config:
    post:
      tags:
      - steam
      summary: Set Force Controller Config
      description: |-
        Enables or disables Steam input config enforcement.
        If `app_id` is omitted, defaults to the currently active app id.
      operationId: set_force_controller_config
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetForceControllerConfigRequest'
        required: true
      responses:
        '200':
          description: OK
  /api/v1/inject_overlay_notifier:
    post:
      tags:
      - inject
      summary: Inject Overlay Notifier
      description: Injects overlay notifier into Steams shared context
      operationId: inject_overlay_notifier
      responses:
        '200':
          description: ''
        '409':
          description: Steam CEF Debugging not reachable
        '500':
          description: Unknown error
  /api/v1/input_info:
    get:
      tags:
      - info
      summary: Get Input Info
      description: Returns information about the controllers detected
      operationId: get_input_info
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InputInfoResponse'
  /api/v1/open_steam_controller_config:
    post:
      tags:
      - steam
      summary: Open Steam Controller Config
      description: |-
        Opens the Steam controller configuration overlay for the given app id.
        If `app_id` is omitted, defaults to the currently active app id (`SteamAppId` env var).
      operationId: open_steam_controller_config
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/OpenSteamControllerConfigRequest'
      responses:
        '200':
          description: OK
        '400':
          description: No app id available
  /api/v1/steam_shortcuts:
    get:
      tags:
      - steam
      summary: List Steam Shortcuts
      description: Lists the active Steam user's non-Steam shortcuts so SISR can switch Steam Input profiles.
      operationId: get_steam_shortcuts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SteamShortcutsResponse'
        '409':
          description: Steam shortcut data unavailable
  /api/v1/steam_shortcuts/launch:
    post:
      tags:
      - steam
      summary: Launch Steam Shortcut
      description: Persists the selected shortcut app id, asks Steam to launch it, then shuts this SISR instance down.
      operationId: launch_steam_shortcut
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectSteamShortcutRequest'
        required: true
      responses:
        '200':
          description: OK
        '400':
          description: Unknown shortcut app id
        '500':
          description: Failed to launch Steam shortcut
        '409':
          description: Steam shortcut data unavailable
  /api/v1/overlay_state_changed:
    post:
      tags:
      - callback
      summary: On overlay change
      description: Callback for when the steam overlay is opened or closed.
      operationId: on_overlay_state_changed
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OverlayStateChangePayload'
        required: true
      responses:
        '200':
          description: ''
        '422':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/restart_sisr:
    post:
      tags:
      - ui
      summary: Restart Application
      description: Shuts the current SISR instance down and relaunches it with the same arguments.
      operationId: restart_sisr
      responses:
        '200':
          description: ''
        '424':
          description: Failed to schedule restart
        '501':
          description: Restart is not implemented on this platform
  /api/v1/restart_steam:
    post:
      tags:
      - steam
      summary: Restart Steam
      description: Attempts to restart Steam
      operationId: restart_steam
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                restart_sisr:
                  type: boolean
        required: true
      responses:
        '200':
          description: ''
        '500':
          description: Unknown error
  /api/v1/show_hide_ui:
    post:
      tags:
      - ui
      summary: Change UI State
      description: Changes the UI state (show/hide)
      operationId: change_ui_state
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeUiStatePayload'
        required: true
      responses:
        '200':
          description: ''
        '500':
          description: Unknown error
  /api/v1/shutdown:
    post:
      tags:
      - ui
      summary: Shutdown Application
      description: Shuts down the application gracefully
      operationId: shutdown
      responses:
        '200':
          description: ''
        '500':
          description: Unknown error
  /api/v1/steam_overlay:
    post:
      tags:
      - ui
      summary: Set Steam Overlay
      description: Enables or disables the SISR Steam overlay window.
      operationId: set_steam_overlay
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetSteamOverlayRequest'
        required: true
      responses:
        '200':
          description: OK
        '500':
          description: Unknown error
  /api/v1/steam_cef_reachable:
    get:
      tags:
      - steam
      summary: Get Steam CEF Remote Debugging Reachability
      description: Returns whether the CEF remote debugging interface of Steam is reachable.
      operationId: steam_cef_reachable
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoteCefReachable'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/steam_status:
    get:
      tags:
      - steam
      summary: Get Steam Status
      description: Returns information about Steam, the SISR marker shortcut, and the CEF remote debugging (of Steam)
      operationId: steam_status
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SteamStatus'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/update:
    get:
      tags:
      - ui
      summary: Get Update State
      description: Returns the current update availability and dismissal state
      operationId: get_update
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateStateResponse'
        '500':
          description: Unknown error
  /api/v1/update/install:
    post:
      tags:
      - ui
      summary: Install Update
      description: Runs the install script for the available update
      operationId: install_update
      responses:
        '200':
          description: ''
        '500':
          description: Unknown error
  /api/v1/update/remind-later:
    post:
      tags:
      - ui
      summary: Remind Later
      description: Dismisses the update notification in-memory until next restart
      operationId: remind_later
      responses:
        '200':
          description: ''
        '500':
          description: Unknown error
  /api/v1/update/skip:
    post:
      tags:
      - ui
      summary: Skip Version
      description: Persistently skips the current available version
      operationId: skip_version
      responses:
        '200':
          description: ''
        '500':
          description: Unknown error
  /api/v1/update/view-on-github:
    post:
      tags:
      - ui
      summary: View on GitHub
      description: Opens the release page in the default browser
      operationId: view_on_github
      responses:
        '200':
          description: ''
        '500':
          description: Unknown error
components:
  schemas:
    ChangeUiStatePayload:
      type: object
      required:
      - show
      properties:
        show:
          type: boolean
    ConfigFileControllerEmulation:
      type: object
      properties:
        allow_desktop_config:
          type:
          - boolean
          - 'null'
          default: null
        default_controller_type:
          type:
          - string
          - 'null'
          default: null
        gyro_passthrough:
          type:
          - boolean
          - 'null'
          default: null
        steam_input_profile_app_id:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
          default: null
        require_controllers_connected_before_launch:
          type:
          - boolean
          - 'null'
          default: null
    ConfigFileData:
      type: object
      properties:
        controller_emulation:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ConfigFileControllerEmulation'
          default: null
        kbm_emulation:
          type:
          - boolean
          - 'null'
          default: null
        log:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ConfigFileLogOpts'
          default: null
        port:
          type:
          - integer
          - 'null'
          format: int32
          default: null
          minimum: 0
        steam:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ConfigFileSteamOpts'
          default: null
        tray:
          type:
          - boolean
          - 'null'
          default: null
        update_notify:
          type:
          - string
          - 'null'
          default: null
        viiper_address:
          type:
          - string
          - 'null'
          default: null
        viiper_password:
          type:
          - string
          - 'null'
          default: null
        window:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ConfigFileWindowOpts'
          default: null
    ConfigFileLogOpts:
      type: object
      properties:
        level:
          type:
          - string
          - 'null'
          default: null
    ConfigFileSteamOpts:
      type: object
      properties:
        no_steam:
          type:
          - boolean
          - 'null'
          default: null
        steam_path:
          type:
          - string
          - 'null'
          default: null
    ConfigFileWindowOpts:
      type: object
      properties:
        continuous_draw:
          type:
          - boolean
          - 'null'
          default: null
        create:
          type:
          - boolean
          - 'null'
          default: null
        fullscreen:
          type:
          - boolean
          - 'null'
          default: null
    DeviceInfo:
      type: object
      required:
      - steam_handle
      - has_viiper_device
      - sdl_device_count
      - sdl_devices
      properties:
        corresponding_device_id:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        has_viiper_device:
          type: boolean
        sdl_device_count:
          type: integer
          format: int32
          minimum: 0
        sdl_devices:
          type: array
          items:
            $ref: '#/components/schemas/SDLDeviceInfo'
        steam_handle:
          type: integer
          format: int64
          minimum: 0
        viiper_type:
          type:
          - string
          - 'null'
    InputInfoResponse:
      type: object
      required:
      - devices
      - viiper
      - keyboard_mouse_emulation
      - steam_overlay_open
      - fullscreen
      - force_controller_config
      properties:
        devices:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DeviceInfo'
          propertyNames:
            type: integer
            format: int64
            minimum: 0
        force_controller_config:
          type: boolean
        force_controller_config_app_id:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        fullscreen:
          type: boolean
        keyboard_mouse_emulation:
          type: boolean
        steam_overlay_open:
          type: boolean
        viiper:
          $ref: '#/components/schemas/ViiperInfo'
    OpenSteamControllerConfigRequest:
      type: object
      properties:
        app_id:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
    OverlayStateChangePayload:
      type: object
      required:
      - open
      properties:
        open:
          type: boolean
    ProblemDetails:
      allOf:
      - oneOf:
        - default: null
        description: |-
          An object containing extensions to this problem details object.

          Note that the extensions will be flattened into the resulting problem details
          representation.

          See [https://www.rfc-editor.org/rfc/rfc9457.html#name-extension-members]() for more information.
      - type: object
        properties:
          detail:
            type:
            - string
            - 'null'
            description: |-
              An optional human-readable description of this problem.

              See [https://www.rfc-editor.org/rfc/rfc9457.html#name-detail]() for more information.
          instance:
            type: string
            format: uri
            description: |-
              An optional uri identifying the specific instance of this problem.

              See [https://www.rfc-editor.org/rfc/rfc9457.html#name-instance]() for more information.
          status:
            type: integer
            format: int32
            description: |-
              An optional status code for this problem.

              See [https://www.rfc-editor.org/rfc/rfc9457.html#name-status]() for more information.
            minimum: 0
          title:
            type:
            - string
            - 'null'
            description: |-
              An optional human-readable title for this problem.

              See [https://www.rfc-editor.org/rfc/rfc9457.html#name-title]() for more information.
          type:
            type: string
            format: uri
            description: |-
              An optional uri describing the problem type.

              See [https://www.rfc-editor.org/rfc/rfc9457.html#name-type]() for more information.
      description: RFC 9457 / RFC 7807 problem details
    RemoteCefReachable:
      type: object
      required:
      - reachable
      properties:
        reachable:
          type: boolean
    RemoteDebugStatus:
      type: object
      required:
      - enabled
      - port
      properties:
        enabled:
          type: boolean
        port:
          type: integer
          format: int32
          minimum: 0
    SDLDeviceInfo:
      type: object
      required:
      - joystick_infos
      - gamepad_infos
      properties:
        gamepad_infos:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SdlValue'
          propertyNames:
            type: string
        joystick_infos:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SdlValue'
          propertyNames:
            type: string
    SdlValue:
      oneOf:
      - type: string
      - type:
        - string
        - 'null'
      - type: integer
        format: int32
        minimum: 0
      - type:
        - integer
        - 'null'
        format: int32
        minimum: 0
      - type:
        - integer
        - 'null'
        format: int32
        minimum: 0
      - type: integer
        format: int32
        minimum: 0
      - type: boolean
      - type: object
    SelectSteamShortcutRequest:
      type: object
      required:
      - app_id
      properties:
        app_id:
          type: integer
          format: int32
          minimum: 0
    SetForceControllerConfigRequest:
      type: object
      required:
      - enforce
      properties:
        app_id:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        enforce:
          type: boolean
    SetSteamOverlayRequest:
      type: object
      required:
      - enabled
      properties:
        enabled:
          type: boolean
    SteamShortcutProfile:
      type: object
      required:
      - app_id
      - game_id
      - name
      - exe
      - selected
      properties:
        app_id:
          type: integer
          format: int32
          minimum: 0
        game_id:
          type: integer
          format: int64
          minimum: 0
        exe:
          type: string
        launch_options:
          type:
          - string
          - 'null'
        name:
          type: string
        selected:
          type: boolean
        start_dir:
          type:
          - string
          - 'null'
    SteamShortcutsResponse:
      type: object
      required:
      - shortcuts_path
      - shortcuts
      properties:
        selected_app_id:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        shortcuts:
          type: array
          items:
            $ref: '#/components/schemas/SteamShortcutProfile'
        shortcuts_path:
          type: string
    SteamStatus:
      type: object
      required:
      - initial_launch
      - no_steam_mode
      - remote_debug
      - running
      - marker_shortcut_present
      - steam_game_id
      - launched_via_steam
      properties:
        initial_launch:
          type: boolean
        launched_via_steam:
          type: boolean
        marker_app_id:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        marker_shortcut_present:
          type: boolean
        no_steam_mode:
          type: boolean
        path:
          type:
          - string
          - 'null'
        remote_debug:
          $ref: '#/components/schemas/RemoteDebugStatus'
        running:
          type: boolean
        steam_game_id:
          type: integer
          format: int64
          minimum: 0
    UpdateStateResponse:
      type: object
      required:
      - update_available
      - dismissed
      - skipped
      properties:
        dismissed:
          type: boolean
          description: 'In-memory only: cleared on restart (remind later)'
        skipped:
          type: boolean
          description: 'Persisted: skip this version'
        update_available:
          type: boolean
        update_version:
          type:
          - string
          - 'null'
    ViiperInfo:
      type: object
      required:
      - address_is_loopback
      - available
      - bus_ids
      properties:
        address:
          type:
          - string
          - 'null'
        address_is_loopback:
          type: boolean
        available:
          type: boolean
        bus_ids:
          type: array
          items:
            type: integer
            format: int32
            minimum: 0
        version:
          type:
          - string
          - 'null'
